name: Build

on:
  push:
    branches: 
      - master
      - 'feature/**'
      - ddd
  pull_request:
    branches:
      - master

jobs:
  phpunit:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "pdo-mysql://db:db@127.0.0.1/db"

    strategy: 
      fail-fast: false
      matrix:
        include:
          - php: 8.2
            symfony: 6.4.*
          - php: 8.3
            symfony: 6.4.*
          - php: 8.4
            symfony: 6.4.*
          - php: 8.2
            symfony: 7.3.*
          - php: 8.3
            symfony: 7.3.*
          - php: 8.4
            symfony: 7.3.*

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
            php-version: ${{ matrix.php }}
            extensions: pdo_mysql

      - name: Configure Symfony version ${{ matrix.symfony }}
        run: |
            composer global config --no-plugins allow-plugins.symfony/flex true
            composer global require --no-interaction --no-progress symfony/flex:^2.4
            composer config extra.symfony.require "${{ matrix.symfony }}"

      - name: Install dependencies
        run: make install

      - name: Check Code
        run: make phpstan

      - name: Run Unit Tests
        run: make phpunit-unit
      
      - name: Migrate Database
        run: make migrate

      - name: Run Acceptance Tests
        run: make phpunit-acceptance

      - name: Run Integration Tests
        run: make phpunit-integration

      - name: Run Functional Tests
        run: make phpunit-functional

    services:
      mariadb:
        image: mariadb:10.5
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: db
          MYSQL_USER: db
          MYSQL_PASSWORD: db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=3